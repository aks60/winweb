<!DOCTYPE html>
<html>
    <head>
        <title>TODO supply a title</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <link rel="stylesheet" type="text/css" media="screen" href="lib-css/jquery-ui-1.13/redmond/jquery-ui.css"> 
        <script type="text/javascript" src="lib-js/jquery-3.6.0/jquery-3.6.0.min.js"></script> 
        <script type="text/javascript" src="lib-js/jquery-ui-1.13/jquery-ui.min.js"></script> 

        <style>
            * {
                box-sizing: border-box;
            }
            body {
                font-family: sans-serif;
            }

            /* Уровень 1: Горизонтальное отображение */
            .main-nav > ul {
                list-style: none;
                padding: 0;
                margin: 0;
                display: flex;
                background-color: #333;
            }

            .main-nav > ul > li {
                position: relative;
            }

            .main-nav a {
                display: block;
                padding: 15px 20px;
                color: #fff;
                text-decoration: none;
            }

            .main-nav a:hover {
                background-color: #555;
            }

            /* Скрытие 2-го и 3-го уровней по умолчанию */
            .menu-level-2, .menu-level-3 {
                display: none;
                list-style: none;
                padding: 0;
                margin: 0;
                position: absolute;
                background-color: #444;
                min-width: 200px;
                z-index: 10;
            }

            /* Уровень 2: Позиционирование под Уровнем 1 */
            .menu-level-1 > li > .menu-level-2 {
                top: 100%;
                left: 0;
            }

            /* Уровень 3: Выезжает справа от Уровня 2 */
            .menu-level-2 > li {
                position: relative;
            }

            .menu-level-2 > li > .menu-level-3 {
                top: 0;
                left: 100%;
            }

            /* Добавляем класс для отображения активного (открытого) меню */
            .menu-level-2.active,
            .menu-level-3.active {
                display: block;
            }
        </style>
    </head>
    <body>
        <nav class="main-nav">
            <ul class="menu-level-1">
                <li>
                    <a href="#">Пункт 1</a>
                    <ul class="menu-level-2">
                        <li>
                            <a href="#">Подпункт 1.1</a>
                            <ul class="menu-level-3">
                                <li><a href="#">Элемент 1.1.1</a></li>
                                <li><a href="#">Элемент 1.1.2</a></li>
                            </ul>
                        </li>
                        <li><a href="#">Подпункт 1.2</a></li>
                    </ul>
                </li>
                <li>
                    <a href="#">Пункт 2</a>
                    <ul class="menu-level-2">
                        <li><a href="#">Подпункт 2.1</a></li>
                    </ul>
                </li>
            </ul>
        </nav>
        <script>
            $(document).ready(function () {
                // Клик по ссылкам, у которых есть следующий уровень меню
                $('.main-nav a').on('click', function (e) {
                    var $this = $(this);
                    var $parentLi = $this.parent();
                    var $submenu = $this.next('ul');

                    // Если подменю существует
                    if ($submenu.length > 0) {
                        e.preventDefault(); // Отменяем переход по ссылке

                        // Если кликнули по уже открытому меню — закрываем его
                        if ($submenu.hasClass('active')) {
                            $submenu.removeClass('active');
                            $submenu.find('ul').removeClass('active'); // Закрываем вложенные (3 уровень)
                        } else {
                            // Закрываем другие открытые подменю на этом же уровне
                            $parentLi.siblings().find('ul').removeClass('active');
                            $parentLi.siblings().children('ul').removeClass('active');

                            // Открываем нужное подменю
                            $submenu.addClass('active');
                        }
                    }
                });

                // Закрываем меню при клике в пустом месте на странице
                $(document).on('click', function (e) {
                    if (!$(e.target).closest('.main-nav').length) {
                        $('.main-nav ul ul').removeClass('active');
                    }
                });
            });
        </script>
    </body>
</html>
