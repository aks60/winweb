<html>
    <head>
        <title>TODO supply a title</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <link rel="stylesheet" type="text/css" media="screen" href="lib-css/jquery-ui-1.13/redmond/jquery-ui.css"> 
        <script type="text/javascript" src="lib-js/jquery-3.6.0/jquery-3.6.0.min.js"></script> 
        <script type="text/javascript" src="lib-js/jquery-ui-1.13/jquery-ui.min.js"></script> 

        <style>
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            body {
                font-family: 'Segoe UI', sans-serif;
                background-color: #f4f4f4;
            }
            .nav-container {
                background-color: #222;
                width: 100%;
            }
            .main-menu {
                list-style: none;
                display: flex;
                justify-content: flex-start;
                max-width: 1200px;
                margin: 0 auto;
            }
            .main-menu > li {
                position: relative;
            }
            .main-menu a {
                display: block;
                padding: 15px 20px;
                color: #fff;
                text-decoration: none;
                transition: background 0.3s;
            }
            .main-menu a:hover {
                background-color: #444;
            }

            /* 2-й уровень меню */
            .main-menu .submenu {
                display: none; /* Скрыто по умолчанию */
                position: absolute;
                top: 100%;
                left: 0;
                background-color: #333;
                list-style: none;
                min-width: 200px;
                z-index: 10;
            }
            .main-menu .submenu > li {
                position: relative;
            }

            /* 3-й уровень меню */
            .main-menu .submenu-third {
                display: none; /* Скрыто по умолчанию */
                position: absolute;
                top: 0;
                left: 100%;
                background-color: #444;
                list-style: none;
                min-width: 200px;
            }
            .main-menu .submenu-third a {
                padding: 12px 20px;
            }
        </style>
    </head>
    <body>
        <nav class="nav-container">
            <ul class="main-menu">
                <li><a href="#">Главная</a></li>
                <li><a href="#">Каталог <span>▼</span></a>
                    <ul class="submenu">
                        <li><a href="#">Электроника <span>►</span></a>
                            <ul class="submenu-third">
                                <li><a href="#">Телефоны</a></li>
                                <li><a href="#">Ноутбуки</a></li>
                                <li><a href="#">Планшеты</a></li>
                            </ul>
                        </li>
                        <li><a href="#">Одежда</a></li>
                        <li><a href="#">Для дома</a></li>
                    </ul>
                </li>
                <li><a href="#">О нас</a></li>
                <li><a href="#">Контакты</a></li>
            </ul>
        </nav>
        <script>
            $(document).ready(function () {
                // Клик на пунктах меню 1-го и 2-го уровня с подменю
                $('.main-menu > li > a, .main-menu .submenu > li > a').on('click', function (e) {
                    var $this = $(this);
                    var $submenu = $this.next('ul');

                    // Если у пункта есть подменю
                    if ($submenu.length) {
                        e.preventDefault(); // Отменяем переход по ссылке

                        // Скрываем остальные открытые подменю (аккордеон)
                        $this.closest('li').siblings().find('ul').slideUp();
                        $this.closest('li').siblings().find('li ul').slideUp();

                        // Переключаем текущее подменю
                        $submenu.stop(true, true).slideToggle();
                    }
                });

                // Закрытие меню при клике в пустом месте сайта
                $(document).on('click', function (e) {
                    if (!$(e.target).closest('.nav-container').length) {
                        $('.main-menu ul').slideUp();
                    }
                });
            });
        </script>
    </body>
</html>
